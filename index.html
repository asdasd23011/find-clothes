<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COMOLI 재고 · 일본 셀렉트숍 횡단</title>
<style>
  :root{
    /* COMOLI 공식 사이트 톤: 중립 화이트 배경, 소프트 블랙, 얇은 회색 라인 */
    --bg:#ffffff; --fg:#1a1a1a; --muted:#8c8c8c; --line:#e6e6e6;
    --soft:#f6f6f6; --ok:#2a6b46; --okbg:#eef4f0; --no:#bdbdbd; --accent:#1a1a1a;
    --panel:#f3f1ec; --panelline:#dcd8cf; /* 발매일 박스 안쪽(따뜻한 오프화이트 패널) */
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font-family:"Apple SD Gothic Neo","Noto Sans KR","Hiragino Kaku Gothic ProN",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  a{color:inherit}
  header{border-bottom:1px solid var(--line);padding:22px 20px 16px;position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);z-index:20}
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .brand h1{font-size:19px;letter-spacing:.18em;margin:0;font-weight:700}
  .brand .sub{font-size:12px;color:var(--muted);letter-spacing:.02em}
  .meta{margin-top:6px;font-size:11.5px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
  .meta b{color:var(--fg);font-weight:600}
  .controls{max-width:1280px;margin:14px auto 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .search{flex:0 1 320px;min-width:170px;max-width:340px;border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-size:13px;outline:none}
  .search:focus{border-color:var(--fg)}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:12.5px;cursor:pointer;white-space:nowrap;color:var(--muted)}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chip .cnt{font-size:10.5px;opacity:.55;margin-left:4px;font-variant-numeric:tabular-nums}
  .catnav{margin-top:12px}
  .catnav .chip{font-size:13px;padding:8px 16px;letter-spacing:.01em}
  .filterlabel{font-size:12px;color:var(--muted);align-self:center;white-space:nowrap}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--accent)}
  select.sort{width:152px;border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-size:13px;background:#fff;cursor:pointer;color:var(--fg)}
  select.sort:focus{border-color:var(--fg);outline:none}
  main{max-width:1280px;margin:0 auto;padding:18px 20px 60px}
  .count{font-size:12px;color:var(--muted);margin:6px 2px 16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px 14px}
  .catpanel{background:var(--panel);border:1px solid var(--panelline);border-radius:8px;padding:18px 18px 22px;margin-bottom:26px}
  .dropgroup{border:1.5px solid var(--fg);border-radius:6px;padding:18px 20px 24px;margin:0 0 26px;background:var(--panel);scroll-margin-top:150px}
  .dropgroup-head{font-size:15px;font-weight:700;letter-spacing:.04em;margin:0 2px 18px;padding-bottom:12px;border-bottom:1px solid var(--panelline);cursor:pointer;user-select:none;display:flex;align-items:center;gap:9px}
  .dropgroup-head:hover{opacity:.7}
  .dropgroup-head .chev{font-size:11px;color:var(--muted);width:12px;flex:none}
  .dropgroup.folded{padding:16px 20px 18px}
  .dropgroup.folded .dropgroup-head{margin:0 2px 14px;padding:0;border-bottom:none}
  /* 접힌 드랍 미리보기: 작은 썸네일 가로 스트립 */
  .preview{display:flex;gap:9px;overflow-x:auto;padding:1px 0 6px;-webkit-overflow-scrolling:touch}
  .preview::-webkit-scrollbar{height:6px}
  .preview::-webkit-scrollbar-thumb{background:#d8d4ca;border-radius:3px}
  .mini{flex:0 0 auto;width:64px;cursor:pointer}
  .mini img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;border:1px solid var(--line);border-radius:3px;background:#fff;transition:transform .25s}
  .mini:hover img{transform:scale(1.06)}
  .mini.out{opacity:.4}
  .dropgroup-head .cnt{font-size:12px;font-weight:500;color:var(--muted)}
  .dropgroup.prevseason{border-color:#c4ccd2;border-style:dashed;background:#e7eaed}
  .dropgroup.prevseason .dropgroup-head{color:var(--muted)}
  .prevtag{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:var(--muted);border-radius:4px;padding:2px 7px;margin-right:6px;vertical-align:middle}
  .card{cursor:pointer;display:flex;flex-direction:column;gap:5px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 10px 13px;transition:border-color .2s,box-shadow .2s,transform .2s}
  .card:hover{border-color:#c7c2b8;box-shadow:0 3px 12px rgba(0,0,0,.06);transform:translateY(-2px)}
  .thumb{position:relative;aspect-ratio:4/5;background:var(--soft);overflow:hidden;border-radius:4px;margin-bottom:4px}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
  .card:hover .thumb img{transform:scale(1.04)}
  .badge{position:absolute;top:8px;left:8px;font-size:9.5px;letter-spacing:.08em;font-weight:600;padding:3px 7px;border-radius:2px;background:rgba(255,255,255,.92);color:var(--no);border:1px solid var(--line)}
  .badge.soldout{background:var(--fg);color:#fff;border:none;letter-spacing:.14em;font-weight:700;padding:4px 9px}
  .card.soldout .thumb img{filter:grayscale(.5);opacity:.55}
  .card.soldout .thumb::after{content:"";position:absolute;inset:0;background:rgba(255,255,255,.18)}
  .card.soldout .price{color:var(--muted)}
  .card.soldout:hover .thumb img{transform:none}
  .cmeta{font-size:10px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;font-variant-numeric:tabular-nums}
  .name{font-size:13px;font-weight:600;line-height:1.35;letter-spacing:.005em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card:hover .name{color:#000}
  .namejp{font-size:10.5px;color:var(--muted);line-height:1.3;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .mnamejp{font-size:12.5px;color:var(--muted);margin-top:-4px}
  .price{font-size:13.5px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px}
  .cshops{font-size:10.5px;color:var(--muted);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cshops .more{color:#bbb}
  .section-h{margin:46px 2px 16px;font-size:13px;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:10px}
  .section-h .n{font-size:11px;color:var(--muted);font-weight:500}
  .note{font-size:11.5px;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:10px 13px;margin:0 2px 14px}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(22,20,15,.45);display:none;z-index:50;align-items:flex-start;justify-content:center;overflow:auto;padding:30px 16px}
  .overlay.on{display:flex}
  .modal{background:#fff;max-width:880px;width:100%;border-radius:12px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;max-height:90vh}
  .modal .mimg{aspect-ratio:4/5;background:var(--soft);align-self:start}
  .modal .mimg img{width:100%;height:100%;object-fit:cover;display:block}
  .mbody{padding:24px;display:flex;flex-direction:column;gap:12px;min-width:0;overflow-y:auto;max-height:90vh}
  .mclose{position:absolute;top:24px;right:24px;font-size:22px;line-height:1;cursor:pointer;color:#fff;z-index:60;background:rgba(0,0,0,.3);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .mcat{font-size:11px;color:var(--muted);letter-spacing:.06em}
  .mname{font-size:18px;font-weight:700;margin:0}
  .mhin{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .mprice{font-size:16px;font-weight:600}
  table.matrix{border-collapse:collapse;width:100%;font-size:12px;margin-top:4px}
  table.matrix th,table.matrix td{border:1px solid var(--line);padding:7px 8px;text-align:center}
  table.matrix th{background:var(--soft);font-weight:600}
  table.matrix th.sz{text-align:left}
  td.o{color:var(--ok);font-weight:700;background:var(--okbg)}
  td.x{color:var(--no)}
  td.q{color:#b58900;font-weight:700}
  td.dash{color:#d8d3c8}
  .legend{font-size:11px;color:var(--muted);margin-top:6px}
  .stock-by-color{display:flex;flex-direction:column;gap:14px;margin-top:4px}
  .cblock .cname{font-size:12.5px;font-weight:700;letter-spacing:.03em;margin-bottom:5px}
  .cblock{overflow-x:auto}
  .cblock table.matrix{width:auto;min-width:min(100%,260px)}
  .buys{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .buy{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--accent);border-radius:8px;padding:10px 13px;font-size:13px;text-decoration:none}
  .buy:hover{background:var(--accent);color:#fff}
  .mnames{font-size:11.5px;color:var(--muted)}
  @media(max-width:640px){.modal{grid-template-columns:1fr;overflow:auto}.modal .mimg{aspect-ratio:1/1;max-height:48vh}.mbody{max-height:none;overflow:visible}}
  /* ── 모바일(≤640px) 반응형 ───────────────────────────── */
  @media(max-width:640px){
    header{padding:14px 14px 11px}
    .brand h1{font-size:17px}
    .brand .sub{font-size:10.5px}
    .meta{font-size:11px;gap:10px;margin-top:5px}
    .controls{gap:8px;margin-top:10px}
    .search{flex:1 1 100%;max-width:none;min-width:0}
    #cats,#drops{flex:1 1 0;display:flex;min-width:0}
    #cats>select,#drops>select{width:100%}
    select.sort{flex:1 1 0;width:auto;min-width:0;padding:9px 9px;font-size:12.5px}
    #navrow{margin-top:6px}
    main{padding:12px 12px 52px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px 10px}
    .dropgroup{padding:14px 12px 18px;scroll-margin-top:206px}
    .dropgroup.folded{padding:12px 12px 14px}
    .dropgroup[id^="grp-season"]{scroll-margin-top:206px}
    .catpanel{padding:14px 12px 18px}
    .dropgroup-head{font-size:13.5px}
    .card{padding:8px 8px 11px;border-radius:7px}
    .card:hover{transform:none;box-shadow:none}
    .name{font-size:12.5px}
    .namejp{font-size:10px}
    .price{font-size:12.5px}
    .cmeta,.cshops{font-size:10px}
    .mini{width:58px}
  }
  footer{max-width:1280px;margin:0 auto;padding:24px 20px 50px;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}
</style>
</head>

    <span id="drops"></span>
    <select class="sort" id="sort">

    <label class="toggle"><input type="checkbox" id="stockonly"> 품절 제외</label>
  </div>
</header>
<main>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>

  <div id="unmatched-wrap" style="display:none">

    <div class="grid" id="ungrid"></div>
  </div>
</main>
<footer>
  Data collected directly from COMOLI's official stockists, merged by product number (品番). Stock reflects the last update time, not real-time.
  <span id="srcnote"></span>
</footer>

<div class="overlay" id="overlay">
  <div class="mclose" id="mclose">×</div>
  <div class="modal" id="modal"></div>
</div>

  const state = { cat: "전체", q: "", stockOnly: false, sort: "release-desc", drop: "전체", fold: {} };
  const fmtDate = (d) => d ? d.slice(5).replace("-", "/") : ""; // 2026-05-15 → 05/15
  const chronoKey = (p) => p.chrono || (p.release && p.release.releaseDate ? p.release.releaseDate : "");
  const relKey = (p) => p.release && p.release.releaseDate ? p.release.releaseDate : "9999-99-99";
  const catsEl = $("#cats");
  const catCount = {};
  DATA.products.forEach((p) => { const c = p.category || "기타"; catCount[c] = (catCount[c] || 0) + 1; });
  const csel = document.createElement("select");
  csel.className = "sort catsel";
  present.forEach((c) => {
    const o = document.createElement("option");
    o.value = c;
    const n = c === "전체" ? DATA.products.length : (catCount[c] || 0);
    o.textContent = `${c === "전체" ? "전체 카테고리" : c} (${n})`;
    csel.appendChild(o);
  });
  csel.value = state.cat;
  csel.onchange = () => { state.cat = csel.value; window.scrollTo({ top: 0, behavior: "smooth" }); render(); };
  catsEl.appendChild(csel);

  // 드랍 칩 = 해당 섹션으로 스크롤 이동(네비게이션). 표시 순서대로(1차→ 이전시즌).
  const dropsEl = $("#drops");
  const dropMap = new Map(); // dropNo -> releaseDate (26SS)
  for (const p of DATA.products) if (p.season === "26SS" && p.release && p.release.dropNo) dropMap.set(p.release.dropNo, p.release.releaseDate);
  const seasonOrder = ["25AW", "25SS", "24AW", "24SS", "23AW", "23SS", "22AW", "22SS"];
  const seasonsPresent = [...new Set(DATA.products.filter((p) => p.season !== "26SS").map((p) => p.season))]
    .sort((a, b) => seasonOrder.indexOf(a) - seasonOrder.indexOf(b));
  const seasonLabelOf = (s) => (DATA.products.find((p) => p.season === s) || {}).seasonLabel || s;
  const navs = [
    { label: "맨 위", to: null },
    ...[...dropMap.keys()].sort((a, b) => b - a).map((d) => ({ label: `${d}차 · ${fmtDate(dropMap.get(d))}`, to: `grp-drop-${d}` })),
    ...seasonsPresent.map((s) => ({ label: seasonLabelOf(s), to: `grp-season-${s}` })),
  ];
  // 칩 두 줄 → 드롭다운 하나(누르면 쫘라락). 고르면 해당 섹션 펼치고 이동.
  dropsEl.innerHTML = "";
  const sel = document.createElement("select");
  sel.className = "sort jump";
  const ph = document.createElement("option");
  ph.value = ""; ph.textContent = "발매일로 이동…"; sel.appendChild(ph);
  navs.forEach((n, i) => {
    const o = document.createElement("option");
    o.value = String(i); o.textContent = n.label; sel.appendChild(o);
  });
  sel.onchange = () => {
    const n = navs[Number(sel.value)];
    sel.value = ""; // 다시 '발매일로 이동…' 으로 리셋(재사용 가능)
    if (!n) return;
    if (!n.to) return window.scrollTo({ top: 0, behavior: "smooth" });
    state.fold[n.to] = false; // 접혀 있으면 펼치고
    render();
    requestAnimationFrame(() => document.getElementById(n.to)?.scrollIntoView({ behavior: "smooth", block: "start" }));
  };
  dropsEl.appendChild(sel);

  $("#q").oninput = (e) => { state.q = e.target.value.trim().toLowerCase(); render(); };
  $("#stockonly").onchange = (e) => { state.stockOnly = e.target.checked; render(); };
  $("#sort").onchange = (e) => { state.sort = e.target.value; render(); };

  function filtered() {
    let list = DATA.products.filter((p) => {
      if (state.cat !== "전체" && catOf(p) !== state.cat) return false;
      if (state.stockOnly && !p.anyAvailable) return false;
      if (state.q) {
        const hay = (p.hinban + " " + (p.nameEn || "") + " " + p.representativeName + " " + Object.values(p.namesByShop).join(" ")).toLowerCase();
        if (!hay.includes(state.q)) return false;
      }
      return true;
    });
    const by = {
      // 시즌 우선(현재 시즌 26SS 먼저), 그 안에서 발매일 순. 이전 시즌은 뒤로.
      release: (a, b) => (a.seasonRank - b.seasonRank) || relKey(a).localeCompare(relKey(b)) || a.hinban.localeCompare(b.hinban),
      "release-desc": (a, b) => (a.seasonRank - b.seasonRank) || relKey(b).localeCompare(relKey(a)) || a.hinban.localeCompare(b.hinban),
      hinban: (a, b) => a.hinban.localeCompare(b.hinban),
      "price-asc": (a, b) => (a.priceYen.min || 0) - (b.priceYen.min || 0),
      "price-desc": (a, b) => (b.priceYen.min || 0) - (a.priceYen.min || 0),
      shops: (a, b) => b.shops.length - a.shops.length,
    };
    return list.sort(by[state.sort]);
  }

  function card(p) {
    const el = document.createElement("div");
    el.className = "card" + (p.anyAvailable ? "" : " soldout");
    const badge = p.anyAvailable ? "" : '<span class="badge soldout">SOLD OUT</span>';
    const shops = p.shops;
    const shopSummary = shops.length <= 2
      ? shops.join(" · ")
      : `${shops.slice(0, 2).join(" · ")} <span class="more">외 ${shops.length - 2}곳</span>`;
    el.innerHTML = `
      <div class="thumb">
        ${p.image ? `<img loading="lazy" src="${p.image}" alt="">` : ""}
        ${badge}
      </div>
      <div class="cmeta">${catOf(p)}${p.isHinban ? ` · ${p.hinban}` : ""}</div>
      <div class="name">${p.nameEn || p.representativeName || ""}</div>
      ${p.nameEn ? `<div class="namejp">${p.representativeName || ""}</div>` : ""}
      <div class="price">${priceLabel(p)}</div>
      <div class="cshops">${shopSummary}</div>`;
    el.onclick = () => openModal(p);
    return el;
  }

  // 접힌 드랍의 미리보기용 작은 썸네일
  function miniCard(p) {
    const el = document.createElement("div");
    el.className = "mini" + (p.anyAvailable ? "" : " out");
    el.innerHTML = p.image ? `<img loading="lazy" src="${p.image}" alt="">` : "";
    el.title = `${p.nameEn || p.representativeName || ""} · ${priceLabel(p)}`;
    el.onclick = (e) => { if (e) e.stopPropagation(); openModal(p); };
    return el;
  }

  const dropHeader = (rel, count) => {
    if (!rel || !rel.releaseDate) return `발매일 미상 · ${count}개`;
    const [y, m, d] = rel.releaseDate.split("-");
    return `${y}년 ${+m}월 ${+d}일 발매${rel.dropNo ? ` · ${rel.dropNo}차 드랍` : ""} <span class="cnt">· ${count}개</span>`;
  };

  function render() {
    const list = filtered();
    $("#count").textContent = `${list.length}개 상품 · 통합 품번 기준`;
    const g = $("#grid");
    g.innerHTML = "";
    // 카테고리 선택 시: 그 카테고리만 평면 그리드(최신순). '전체'일 때만 발매일별 묶음/미리보기.
    const jump = $("#drops"); if (jump) jump.style.display = state.cat === "전체" ? "" : "none"; // 발매일이동은 전체뷰에서만
    const grouped = (state.sort === "release" || state.sort === "release-desc") && state.cat === "전체";
    if (grouped) {
      g.className = ""; // 그룹 컨테이너(내부에 .grid)
      const groups = [];
      let last = null;
      for (const p of list) {
        const k = p.season === "26SS" ? ((p.release && p.release.releaseDate) || "미상") : ("S:" + p.season);
        if (!last || last.key !== k) {
          last = { key: k, rel: p.release, season: p.season, label: p.seasonLabel, items: [] };
          groups.push(last);
        }
        last.items.push(p);
      }
      // 현재 시즌은 '최신 드랍'만 기본 펼침(가장 큰 차수)
      const maxDrop26 = Math.max(0, ...groups.filter((gr) => gr.season === "26SS" && gr.rel && gr.rel.dropNo).map((gr) => gr.rel.dropNo));
      for (const grp of groups) {
        const prev = grp.season !== "26SS";
        const wrap = document.createElement("div");
        wrap.className = "dropgroup" + (prev ? " prevseason" : "");
        wrap.id = grp.season === "26SS"
          ? (grp.rel && grp.rel.dropNo ? `grp-drop-${grp.rel.dropNo}` : "grp-undated")
          : `grp-season-${grp.season}`;
        // 접힘 기본값: 현재 시즌은 '최신 드랍'만 펼침, 그 외(이전 드랍·이전 시즌)는 접힘. 사용자가 토글하면 그 값 우선.
        const isNewest = !prev && grp.rel && grp.rel.dropNo === maxDrop26 && maxDrop26 > 0;
        const collapsed = (wrap.id in state.fold) ? state.fold[wrap.id] : !isNewest;
        if (collapsed) wrap.className += " folded";
        const head = document.createElement("div");
        head.className = "dropgroup-head";
        const label = prev
          ? `<span class="prevtag">이전 시즌</span> ${grp.label || grp.season} <span class="cnt">· ${grp.items.length}개</span>`
          : dropHeader(grp.rel, grp.items.length);
        head.innerHTML = `<span class="chev">${collapsed ? "▸" : "▾"}</span>${label}`;
        head.onclick = () => { state.fold[wrap.id] = !collapsed; render(); };
        wrap.appendChild(head);
        if (!collapsed) {
          const inner = document.createElement("div");
          inner.className = "grid";
          grp.items.forEach((p) => inner.appendChild(card(p)));
          wrap.appendChild(inner);
        } else {
          // 접힘 = 작은 썸네일 미리보기 줄(가로 스크롤). 헤더 클릭 시 전체 카드로 펼침.
          const pv = document.createElement("div");
          pv.className = "preview";
          grp.items.forEach((p) => pv.appendChild(miniCard(p)));
          wrap.appendChild(pv);
        }
        g.appendChild(wrap);
      }
    } else {
      // 카테고리/정렬 뷰: 전체 페이지와 같은 따뜻한 패널 배경 + 카드 타일
      g.className = "";
      const panel = document.createElement("div");
      panel.className = "catpanel";
      const grid = document.createElement("div");
      grid.className = "grid";
      list.forEach((p) => grid.appendChild(card(p)));
      panel.appendChild(grid);
      g.appendChild(panel);
    }

    // 미매칭
    const uw = $("#unmatched-wrap");
    if (DATA.unmatched && DATA.unmatched.length) {
      uw.style.display = "";
      $("#umN").textContent = DATA.unmatched.length + "건";
      const ug = $("#ungrid");
      ug.innerHTML = "";
      DATA.unmatched.forEach((u) => {
        const el = document.createElement("div");
        el.className = "card";
        el.innerHTML = `
          <div class="thumb">${u.image ? `<img loading="lazy" src="${u.image}">` : ""}
            <span class="badge">${u.shop}</span></div>
          <div class="cat">품번 미상</div>
          <div class="name">${u.productName || ""}</div>
          <div class="hin">${u.internalCode || ""}</div>
          <div class="price">${u.count}개 변형</div>`;
        if (u.productUrl) el.onclick = () => window.open(u.productUrl, "_blank");
        ug.appendChild(el);
      });
    } else uw.style.display = "none";
  }

  // ---- 모달: 숍 × 사이즈 재고 매트릭스 ----
  function openModal(p) {
    const shops = p.shops.slice(); // 구매 링크용(숍 목록)
    const natural = (a, b) => String(a).localeCompare(String(b), "ja", { numeric: true });
    const combine = (prev, cur) => {
      if (prev === true || cur === true) return true;
      if (prev === false || cur === false) return false;
      return prev === undefined ? cur : prev; // null/undefined
    };
    // 컬러 → {shops, sizes, av:Map("size|shop"→bool/null)}
    const data = new Map(); const colorOrder = [];
    for (const srow of p.sizes) for (const e of srow.shops) {
      const c = e.color || "__none";
      if (!data.has(c)) { data.set(c, { shops: new Set(), sizes: new Set(), av: new Map() }); colorOrder.push(c); }
      const d = data.get(c);
      d.shops.add(e.shop); d.sizes.add(srow.size);
      const k = srow.size + "|" + e.shop;
      d.av.set(k, combine(d.av.get(k), e.available));
    }
    const cellHtml = (v) => v === true ? '<td class="o">○</td>'
      : v === false ? '<td class="x">×</td>'
      : v === null ? '<td class="q" title="재고 미확인 — 숍에서 확인">?</td>'
      : '<td class="dash">–</td>'; // undefined = 해당 사이즈 미취급
    const colorBlocks = colorOrder.map((c) => {
      const d = data.get(c);
      const shops = [...d.shops];
      const sizes = [...d.sizes].sort(natural);
      const label = c === "__none" ? "" : `<div class="cname">${c}</div>`;
      const head = `<tr><th class="sz">사이즈${shops.length > 1 ? " \\ 숍" : ""}</th>${shops.map((s) => `<th>${s}</th>`).join("")}</tr>`;
      const rows = sizes.map((sz) =>
        `<tr><th class="sz">${sz}</th>${shops.map((s) => cellHtml(d.av.get(sz + "|" + s))).join("")}</tr>`).join("");
      return `<div class="cblock">${label}<table class="matrix">${head}${rows}</table></div>`;
    }).join("");
    const buyUrl = (shop) => {
      for (const s of p.sizes) { const e = s.shops.find((x) => x.shop === shop); if (e) return e.productUrl; }
      return "#";
    };
    const names = Object.entries(p.namesByShop).map(([s, n]) => `${s}: ${n}`).join(" · ");
    const buys = shops.map((s) =>
      `<a class="buy" href="${buyUrl(s)}" target="_blank" rel="noopener"><span>${s} 에서 보기</span><span>↗</span></a>`).join("");
    $("#modal").innerHTML = `
      <div class="mimg">${p.image ? `<img src="${p.image}">` : ""}</div>
      <div class="mbody">
        <div class="mcat">${catOf(p)}${p.release && p.release.releaseDate ? ` · 발매 ${fmtDate(p.release.releaseDate)}${p.release.dropNo ? ` (${p.release.dropNo}차 드랍)` : ""}` : ""} · ${p.colors.join(" / ") || "-"}</div>
        <h2 class="mname">${p.nameEn || p.representativeName || ""}</h2>
        ${p.nameEn ? `<div class="mnamejp">${p.representativeName || ""}</div>` : ""}
        <div class="mhin">${p.isHinban ? "품번 " + p.hinban : p.release && p.release.en ? p.release.en : ""}</div>
        <div class="mprice">${priceLabel(p)}</div>
        <div class="stock-by-color">${colorBlocks}</div>
        <div class="legend">○ 재고 있음 · × 품절 · ? 재고 미확인(숍에서 확인) · – 미취급</div>
        <div class="mnames">${names}</div>
        <div class="buys">${buys}</div>
      </div>`;
    $("#overlay").classList.add("on");
  }
  $("#mclose").onclick = () => $("#overlay").classList.remove("on");
  $("#overlay").onclick = (e) => { if (e.target.id === "overlay") $("#overlay").classList.remove("on"); };
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") $("#overlay").classList.remove("on"); });

  render();
})();

</script>
</body>
</html>
